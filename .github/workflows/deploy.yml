name: Build & deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Refresh live scores roughly every 10 minutes (GitHub may delay this a bit).
    - cron: '*/10 * * * *'

# Allow this workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; let a newer run replace an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Pull fresh fixtures/scores using the secret token and bake them into the
      # site as a static file the client reads. The token is never exposed.
      - name: Fetch latest match data
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: |
          mkdir -p public
          curl -sf -H "X-Auth-Token: $FOOTBALL_DATA_TOKEN" \
            "https://api.football-data.org/v4/competitions/WC/matches" \
            -o public/matches.json
          echo "Saved $(wc -c < public/matches.json) bytes of match data."

      - run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deploy
        uses: actions/deploy-pages@v4
