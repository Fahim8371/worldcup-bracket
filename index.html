<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>World Cup 2026 — My Bracket</title>

    <!-- PWA / installable web app -->
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#0b1220" />
    <link rel="icon" type="image/png" href="icons/favicon-32.png" />

    <!-- iOS: fullscreen "native" home-screen app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="World Cup 26" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

    <!-- Apply the saved theme before paint to avoid a flash of the wrong colours. -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('wc2026.theme') || 'system';
          var dark =
            pref === 'dark' ||
            (pref === 'system' &&
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          var theme = dark ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', theme);
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute('content', dark ? '#0b1220' : '#f4f6fb');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
